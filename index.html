<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>记忆博物馆 - 宇宙中的永恒</title>
    <style>
        :root {
            --space-bg: #0B0E14; 
            --star-gold: #C69F6D; 
            --paper-yellow: #FFF9E5; 
            --text-light: #E0E0E0;
            --path-color: rgba(198, 159, 109, 0.3);
        }

        body {
            font-family: 'Noto Serif SC', 'Source Han Serif SC', serif;
            background-color: var(--space-bg);
            color: var(--text-light);
            margin: 0;
            line-height: 1.8;
            background-image: radial-gradient(circle at 50% 50%, #161B22 0%, #0B0E14 100%);
        }

        .header-quote {
            text-align: center;
            padding: 60px 20px;
            border-bottom: 1px solid rgba(198, 159, 109, 0.1);
        }
        .header-quote h1 { font-weight: 300; letter-spacing: 5px; color: var(--star-gold); margin: 0; }
        .quote-sub { font-style: italic; opacity: 0.7; font-size: 0.9em; margin-top: 10px; color: #AAA; }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; position: relative; }
        
        /* 视图切换 */
        .view { display: none; opacity: 0; transform: translateY(10px); transition: all 0.5s ease; }
        .view.active { display: block; opacity: 1; transform: translateY(0); }

        /* 导航卡片 */
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .nav-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(198, 159, 109, 0.2);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }
        .nav-box:hover { background: rgba(198, 159, 109, 0.08); border-color: var(--star-gold); }
        .nav-box h3 { color: var(--star-gold); font-weight: 400; margin-bottom: 8px; }

        /* 档案卡片 */
        .base-info-card { 
            background: rgba(255,255,255,0.02); 
            padding: 25px; 
            border: 1px solid rgba(198,159,109,0.1); 
            margin-bottom: 30px; 
            border-radius: 8px;
        }
        .info-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        label { display: block; font-size: 0.85em; color: var(--star-gold); margin-bottom: 5px; }
        input, textarea {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #444; 
            color: white; padding: 12px; border-radius: 6px; font-family: inherit; box-sizing: border-box;
        }

        /* 生命小路 (蜿蜒排序) */
        .path-display-area { position: relative; width: 100%; min-height: 400px; margin-top: 40px; padding: 50px 0; }
        .vertical-line { position: absolute; left: 50%; width: 2px; height: 100%; background: var(--path-color); transform: translateX(-50%); }
        .life-node {
            position: absolute; width: 40%; padding: 15px; border-radius: 8px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(198,159,109,0.2);
            font-size: 0.9em; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 2;
        }
        .life-node:nth-child(even) { left: 5%; text-align: right; border-right: 3px solid var(--star-gold); }
        .life-node:nth-child(odd) { left: 55%; border-left: 3px solid var(--star-gold); }
        .node-date { color: var(--star-gold); font-weight: bold; display: block; margin-bottom: 5px; }
        .node-img { width: 100%; margin-top: 10px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }

        /* 人生拼图 - 便利贴 */
        .mosaic-container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top: 30px; }
        .sticky-note {
            background: var(--paper-yellow); color: #333; width: 220px; min-height: 220px;
            padding: 20px; box-shadow: 8px 8px 20px rgba(0,0,0,0.5);
            transform: rotate(-1.5deg); font-family: 'Kaiti', 'STKaiti', serif; transition: 0.3s;
            position: relative; display: flex; flex-direction: column;
        }
        .sticky-note img { width: 100%; max-height: 110px; object-fit: cover; border-radius: 2px; margin-bottom: 10px; }
        .sticky-note .note-text { flex: 1; overflow-wrap: break-word; line-height: 1.5; font-size: 1.05em; }
        .note-footer { display: flex; justify-content: space-between; margin-top: 15px; opacity: 0.4; font-size: 0.8em; }
        .note-footer span { cursor: pointer; text-decoration: underline; }
        .note-footer span:hover { opacity: 1; color: #d00; }

        /* 未竟之事 */
        .todo-item { display: flex; align-items: center; background: rgba(255,255,255,0.04); padding: 18px; margin: 12px 0; border-radius: 8px; border-left: 4px solid var(--star-gold); }
        .todo-checkbox { width: 30px; height: 30px; margin-right: 20px; cursor: pointer; accent-color: var(--star-gold); }
        .todo-content { flex: 1; font-size: 1.2em; color: #FFF; }
        .todo-item.completed { opacity: 0.4; filter: grayscale(1); }
        .todo-item.completed .todo-content { text-decoration: line-through; }

        /* 核心评分 */
        .star-row { margin: 10px 0; }
        .star { font-size: 2.2em; color: #333; cursor: pointer; padding: 0 4px; transition: 0.2s; }
        .star.active { color: var(--star-gold); text-shadow: 0 0 10px var(--star-gold); }

        /* UI 元素 */
        .btn-ui { background: transparent; border: 1px solid var(--star-gold); color: var(--star-gold); padding: 10px 25px; border-radius: 25px; cursor: pointer; transition: 0.3s; }
        .btn-ui:hover { background: var(--star-gold); color: white; }
        .file-label { font-size: 0.8em; color: var(--star-gold); cursor: pointer; text-decoration: underline; margin-right: 15px; }
    </style>
</head>
<body>

<div class="header-quote">
    <h1>“死亡不是终点，遗忘才是。”</h1>
    <p class="quote-sub">Death is not the end of life, forgetting is the end of life.</p>
</div>

<div class="container">
    
    <div id="view-home" class="view active">
        <div class="base-info-card">
            <h2 style="color: var(--star-gold); font-weight: 300; margin-top:0;">馆藏基本档案</h2>
            <div class="info-row">
                <div><label>姓名</label><input type="text" id="p-name" placeholder="TA的名字"></div>
                <div><label>与我的关系</label><input type="text" id="p-rel" placeholder="如：外婆、恩师"></div>
                <div><label>生命历程</label><input type="text" id="p-years" placeholder="XXXX年XX月XX日 - XXXX年XX月XX日"></div>
            </div>
        </div>

        <div class="module-grid">
            <div class="nav-box" onclick="showView('sensory')"><h3>👃 感官回响</h3><p>面貌、声音与熟悉的味道</p></div>
            <div class="nav-box" onclick="showView('path')"><h3>🛤️ 生命小路</h3><p>按日期自动排序的人生轨迹</p></div>
            <div class="nav-box" onclick="showView('mosaic')"><h3>🧩 人生拼图</h3><p>带照片的回忆便利贴墙</p></div>
            <div class="nav-box" onclick="showView('todo')"><h3>🕯️ 未竟之事</h3><p>代TA完成的愿望清单</p></div>
            <div class="nav-box" onclick="showView('eval')"><h3>🌟 核心回顾</h3><p>多维度的生命感悟</p></div>
        </div>
    </div>

    <div id="view-sensory" class="view">
        <button class="btn-ui" onclick="showView('home')">← 返回封面</button>
        <div class="module-grid">
            <div class="nav-box"><h4>面貌特征</h4><textarea id="s-face" placeholder="眼睛、笑容、或是那颗痣..."></textarea></div>
            <div class="nav-box"><h4>记忆味道</h4><textarea id="s-smell" placeholder="熟悉的味道..."></textarea></div>
            <div class="nav-box"><h4>独特声音</h4><textarea id="s-voice" placeholder="TA说话的语气..."></textarea></div>
            <div class="nav-box"><h4>习惯动作</h4><textarea id="s-habit" placeholder="下意识的小动作..."></textarea></div>
        </div>
    </div>

    <div id="view-path" class="view">
        <button class="btn-ui" onclick="showView('home')">← 返回封面</button>
        <div class="base-info-card">
            <h3>添加生命节点</h3>
            <div class="info-row" style="align-items: flex-end;">
                <div><label>日期</label><input type="date" id="path-date-input"></div>
                <div><label>事件</label><input type="text" id="path-desc-input" placeholder="发生了什么？"></div>
                <div>
                    <label class="file-label">🖼️ 上传照片 <input type="file" id="path-img-input" hidden accept="image/*" onchange="previewImgName(this)"></label>
                </div>
                <button class="btn-ui" onclick="addPathNode()">记录</button>
            </div>
            <p id="path-file-name" style="font-size: 0.7em; color: var(--star-gold); margin-top: 5px;"></p>
        </div>
        <div class="path-display-area" id="path-list">
            <div class="vertical-line"></div>
        </div>
    </div>

    <div id="view-mosaic" class="view">
        <button class="btn-ui" onclick="showView('home')">← 返回封面</button>
        <div class="base-info-card">
            <label>一段回忆 / 他人的印象</label>
            <textarea id="mosaic-text-input" rows="3" placeholder="写下那些珍贵的瞬间..."></textarea>
            <div style="margin-top:10px;">
                <label class="file-label">📷 插入照片 <input type="file" id="mosaic-img-input" hidden accept="image/*"></label>
                <button class="btn-ui" onclick="addMosaic()">贴上墙</button>
            </div>
        </div>
        <div class="mosaic-container" id="mosaic-wall"></div>
    </div>

    <div id="view-todo" class="view">
        <button class="btn-ui" onclick="showView('home')">← 返回封面</button>
        <div class="base-info-card">
            <p style="color:var(--star-gold); font-size: 0.9em; margin-bottom: 20px;">
                💡 那些未了的心愿，你可以代为完成。完成后勾选，象征一种圆满。
            </p>
            <div class="info-row">
                <input type="text" id="todo-input" placeholder="输入一件未竟之事...">
                <button class="btn-ui" onclick="addTodo()">记录清单</button>
            </div>
        </div>
        <div id="todo-list-container"></div>
    </div>

    <div id="view-eval" class="view">
        <button class="btn-ui" onclick="showView('home')">← 返回封面</button>
        <div class="base-info-card">
            <div class="eval-item">
                <h4>生命历程的丰富程度</h4>
                <div class="star-row" onclick="handleStarClick(event)">
                    <span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span>
                </div>
                <textarea placeholder="评分理由..."></textarea>
            </div>
            <div class="eval-item" style="margin-top:30px">
                <h4>性格的独特性/温度</h4>
                <div class="star-row" onclick="handleStarClick(event)">
                    <span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span>
                </div>
                <textarea placeholder="关于TA的性格特质..."></textarea>
            </div>
        </div>
    </div>

</div>

<script>
    // --- 路由逻辑 ---
    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        window.scrollTo(0, 0);
    }

    // --- 生命小路 logic ---
    let pathData = [];
    function previewImgName(input) {
        document.getElementById('path-file-name').innerText = input.files[0] ? "已选择: " + input.files[0].name : "";
    }

    async function addPathNode() {
        const date = document.getElementById('path-date-input').value;
        const desc = document.getElementById('path-desc-input').value;
        const file = document.getElementById('path-img-input').files[0];
        
        if(!date || !desc) return;

        let imgUrl = null;
        if(file) {
            imgUrl = await toBase64(file);
        }

        pathData.push({ date, desc, img: imgUrl });
        pathData.sort((a, b) => new Date(a.date) - new Date(b.date));
        renderPath();
        
        // 重置
        document.getElementById('path-desc-input').value = "";
        document.getElementById('path-img-input').value = "";
        document.getElementById('path-file-name').innerText = "";
    }

    function renderPath() {
        const list = document.getElementById('path-list');
        list.innerHTML = '<div class="vertical-line"></div>';
        pathData.forEach((node, idx) => {
            const div = document.createElement('div');
            div.className = 'life-node';
            div.style.top = (idx * 280 + 50) + 'px';
            div.innerHTML = `
                <span class="node-date">${node.date}</span>
                <div class="node-text">${node.desc}</div>
                ${node.img ? `<img src="${node.img}" class="node-img">` : ''}
            `;
            list.appendChild(div);
        });
        list.style.minHeight = (pathData.length * 280 + 300) + 'px';
    }

    // --- 人生拼图 logic ---
    let mosaics = [];
    async function addMosaic() {
        const text = document.getElementById('mosaic-text-input').value;
        const file = document.getElementById('mosaic-img-input').files[0];
        if(!text && !file) return;

        let imgUrl = null;
        if(file) imgUrl = await toBase64(file);

        const newItem = { id: Date.now(), text, img: imgUrl };
        mosaics.push(newItem);
        renderMosaic();
        
        document.getElementById('mosaic-text-input').value = "";
        document.getElementById('mosaic-img-input').value = "";
    }

    function renderMosaic() {
        const wall = document.getElementById('mosaic-wall');
        wall.innerHTML = '';
        mosaics.forEach(m => {
            const note = document.createElement('div');
            note.className = 'sticky-note';
            note.innerHTML = `
                ${m.img ? `<img src="${m.img}">` : ''}
                <div class="note-text">${m.text}</div>
                <div class="note-footer">
                    <span onclick="editMosaic(${m.id})">编辑</span>
                    <span onclick="deleteMosaic(${m.id})">删除</span>
                </div>
            `;
            wall.appendChild(note);
        });
    }

    function deleteMosaic(id) {
        mosaics = mosaics.filter(m => m.id !== id);
        renderMosaic();
    }

    function editMosaic(id) {
        const m = mosaics.find(m => m.id === id);
        const newText = prompt("修改这段回忆:", m.text);
        if(newText !== null) {
            m.text = newText;
            renderMosaic();
        }
    }

    // --- 未竟之事 ---
    function addTodo() {
        const val = document.getElementById('todo-input').value;
        if(!val) return;
        const container = document.getElementById('todo-list-container');
        const item = document.createElement('div');
        item.className = 'todo-item';
        item.innerHTML = `
            <input type="checkbox" class="todo-checkbox" onchange="this.parentElement.classList.toggle('completed')">
            <div class="todo-content">${val}</div>
        `;
        container.appendChild(item);
        document.getElementById('todo-input').value = "";
    }

    // --- 评分逻辑 (无弹窗) ---
    function handleStarClick(e) {
        if(e.target.classList.contains('star')) {
            const stars = Array.from(e.currentTarget.children);
            const index = stars.indexOf(e.target);
            stars.forEach((s, i) => {
                s.classList.toggle('active', i <= index);
            });
        }
    }

    // 工具函数：File to Base64
    function toBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

</script>
</body>
</html>
